trigger:
  - test-ios-pipeline

pool:
  vmImage: 'macos-latest'

name: $(date:yyyy).$(Month)$(rev:.r)

steps:
  - task: NodeTool@0
    displayName: 'Install Node'
    inputs:
      versionSpec: '18.19.0'

  - script: |
      yarn install --network-concurrency=1
    displayName: Install Dependencies
  - task: CocoaPods@0
    displayName: 'Install CocoaPods dependencies'
    inputs:
      workingDirectory: ios
      forceRepoUpdate: false

  - task: InstallAppleCertificate@2
    displayName: 'Install Apple Certificate'
    inputs:
      certSecureFile: 'dev-certificate.p12'
      certPwd: 'k/b25N;:8va6_TH3CUQjd"' #(CertificatePassword)

  - task: InstallAppleProvisioningProfile@1
    displayName: 'Install Apple Mobile Provisioning Profile'
    inputs:
      provisioningProfileLocation: 'secureFiles'
      provProfileSecureFile: 'app.mobileprovision'

  # - task: ios-bundle-version@1
  #   displayName: 'Set versions'
  #   inputs:
  #     sourcePath: 'ios/smartie/Info.plist'
  #     versionCodeOption: 'buildid'
  #     versionCode: '1' #$(Build.BuildId)
  #     printFile: true

  - script: |
      xcodebuild -version
      xcodebuild -showsdks
    displayName: Check XCode

  - task: Xcode@5
    displayName: 'Build IPA'
    inputs:
      actions: 'build -verbose'
      configuration: 'Release'
      sdk: 'iphoneos16.2'
      xcWorkspacePath: 'ios/smartie.xcworkspace'
      scheme: 'smartie'
      packageApp: true
      exportPath: 'output/package'
      archivePath: 'output/archive'
      signingOption: 'default'
      xcodeVersion: 'specifyPath'
      xcodeDeveloperDir: '/Applications/Xcode_14.2.app/Contents/Developer'

  # - task: CmdLine@2
